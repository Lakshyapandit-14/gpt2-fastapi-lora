name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies using uv
      run: |
        pip install uv
        uv pip install --system -r requirements.txt

    - name: Lint with Ruff
      run: |
        # Run ruff using uvx to automatically download and run it ephemerally
        uvx ruff check .
        
    - name: Verify syntax
      run: |
        python -m py_compile main.py
