version: '3.8'

services:
  api:
    build: .
    container_name: gpt2-fastapi-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: always

  frontend:
    build: .
    container_name: gpt2-fastapi-frontend
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://api:8000/generate
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: always
